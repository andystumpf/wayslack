name: Notify Dashboard

on:
  push:
    branches: ["**"]

jobs:
  notify:
    runs-on: ubuntu-latest
    # Skip pushes to the dashboard repo itself
    if: github.repository != 'andystumpf/github-progress-dashboard'
    steps:
      - name: Trigger dashboard update
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.DASHBOARD_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/andystumpf/github-progress-dashboard/dispatches \
            -d '{ "event_type": "repo-pushed", "client_payload": { "repo": "${{ github.event.repository.name }}", "sha": "${{ github.sha }}" } }'
